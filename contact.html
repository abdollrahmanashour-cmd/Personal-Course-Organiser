<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Personal Course Organizer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="logo">Personal Course Organiser</a>
            <ul class="nav-links">
                <li><a href="index.html" class="active">Home</a></li>
                <li><a href="my-courses.html">My Courses</a></li>
                <li><a href="add-course.html">Add Course</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section>
            <h1>Contact Us</h1>
            <p>If you have any questions or feedback, feel free to reach out using the form below.</p>
            <br>
            <form action="#" method="get">
                <div class="form-group">
                    <label for="fullname">Full Name : </label>
                    <input type="text" id="fullname" name="fullname" placeholder="Your name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address : </label>
                    <input type="email" id="email" name="email" placeholder="Your email address" required>
                </div>

                <div class="form-group">
                    <label for="message">Message :</label>
                    <textarea name="message" id="message" rows="5" placeholder="How can we help you ?" required></textarea>
                </div>
                <button type="submit">Send Message</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy;2026 Personal Course Organizer. All rights reserved.</p>
    </footer>
</body>
</html>
